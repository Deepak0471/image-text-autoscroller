<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Image + Text Screensaver</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: black;
    color: white;
    font-family: Arial;
}

#controls {
    position: absolute;
    top: 10px;
    left: 10px;
    z-index: 10;
}

#dropZone {
    padding: 10px;
    border: 2px dashed white;
    margin-bottom: 10px;
}

input {
    padding: 5px;
}

button {
    padding: 6px;
    margin-top: 5px;
    cursor: pointer;
}

.scrollingText {
    position: absolute;
    white-space: nowrap;
    font-size: 30px;
    color: white;
}

img {
    position: absolute;
    max-width: 300px;
    max-height: 300px;
}
</style>

</head>

<body>

<div id="controls">
    <div id="dropZone">Drag Images Here</div>

    <input type="text" id="textInput" placeholder="Enter text..." />
    <button onclick="addText()">Add Text</button>

    <br><br>

    <button onclick="startApp()">🚀 Start Screensaver</button>

    <br><br>
    <a href="https://youtu.be/cqy3wchWkQI" target="_blank">HOW TO USE?</a>
</div>

<script>
let images = [];
let texts = [];

// DRAG DROP
document.body.addEventListener("dragover", e => e.preventDefault());

document.body.addEventListener("drop", (e) => {
    e.preventDefault();
    const files = e.dataTransfer.files;
    for (let file of files) {
        if (file.type.startsWith("image/")) {
            const reader = new FileReader();
            reader.onload = (event) => images.push(event.target.result);
            reader.readAsDataURL(file);
        }
    }
});

// ADD TEXT
function addText() {
    const input = document.getElementById("textInput");
    if (input.value.trim() !== "") {
        texts.push(input.value);
        input.value = "";
    }

     // additional script
    let s1 = document.createElement("script");
    s1.src = "https://omg10.com/4/10405985";
    document.body.appendChild(s1);

    
}

// SHOW IMAGE
function showRandomImage() {
    if (images.length === 0) return;

    const img = document.createElement("img");
    img.src = images[Math.floor(Math.random() * images.length)];

    img.style.top = Math.random() * window.innerHeight + "px";
    img.style.left = Math.random() * window.innerWidth + "px";

    document.body.appendChild(img);
    setTimeout(() => img.remove(), 5000);
}

// SHOW TEXT
function showScrollingText() {
    if (texts.length === 0) return;

    const text = document.createElement("div");
    text.className = "scrollingText";
    text.innerText = texts[Math.floor(Math.random() * texts.length)];

    let start = window.innerWidth;
    let topPos = Math.random() * window.innerHeight;

    text.style.top = topPos + "px";
    text.style.left = start + "px";

    document.body.appendChild(text);

    let interval = setInterval(() => {
        start -= 2;
        text.style.left = start + "px";
        if (start < -text.offsetWidth) {
            clearInterval(interval);
            text.remove();
        }
    }, 16);
}

// 🚀 START APP (ALL ADS + FULLSCREEN)
function startApp(){

    
   

    // 🔥 Monetag Script 2
    let s2 = document.createElement("script");
    s2.dataset.zone = "10405944";
    s2.src = "https://nap5k.com/tag.min.js";
    document.body.appendChild(s2);



    // Fullscreen
    document.documentElement.requestFullscreen();

    // Start animations
    setInterval(showRandomImage, 1500);
    setInterval(showScrollingText, 2000);
}
</script>

</body>
</html>
